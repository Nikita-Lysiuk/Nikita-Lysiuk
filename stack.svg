    .r2 { animation-delay: 0.6s; }
    .r3 { animation-delay: 0.85s; }
    @keyframes rowIn { from { opacity: 0; } to { opacity: 1; } }
    .cursor { animation: blink 1.2s steps(1) infinite; }
    @keyframes blink { 0%, 55% { opacity: 1; } 56%, 100% { opacity: 0; } }
  </style>
