<svg width="900" height="398" viewBox="0 0 900 398" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.07"/>
      <stop offset="45%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <style>
    .ln { animation: lineIn 0.45s ease-out backwards; }

    .l0 { animation-delay: 0.15s; }
    .l1 { animation-delay: 0.33s; }
    .l2 { animation-delay: 0.51s; }
    .l3 { animation-delay: 0.69s; }
    .l4 { animation-delay: 0.87s; }
    .l5 { animation-delay: 1.05s; }
    .l6 { animation-delay: 1.23s; }
    .l7 { animation-delay: 1.41s; }
    .l8 { animation-delay: 1.59s; }
    .l9 { animation-delay: 1.77s; }
    .l10 { animation-delay: 1.95s; }
    .l11 { animation-delay: 2.13s; }
    @keyframes lineIn { from { opacity: 0; } to { opacity: 1; } }
    .cursor { animation: blink 1.1s steps(1) infinite; }
    @keyframes blink { 0%, 55% { opacity: 1; } 56%, 100% { opacity: 0; } }
  </style>
  <rect x="0.5" y="0.5" width="899" height="397" rx="12" fill="#0d0d16"/>
  <rect x="0.5" y="0.5" width="899" height="397" rx="12" fill="url(#sheen)"/>
  <rect x="0.5" y="0.5" width="899" height="397" rx="12" fill="none" stroke="#23233a" stroke-width="1"/>
  <!-- titlebar -->
  <line x1="1" y1="44" x2="899" y2="44" stroke="#23233a" stroke-width="1"/>
  <circle cx="28" cy="22" r="5.5" fill="#7c3aed" opacity="0.85"/>
  <circle cx="48" cy="22" r="5.5" fill="#7c3aed" opacity="0.45"/>
  <circle cx="68" cy="22" r="5.5" fill="#7c3aed" opacity="0.22"/>
  <text x="450" y="26" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#8b949e" opacity="0.7">nikita@dev: ~/philosophy</text>
  <text x="876" y="26" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="10" fill="#8b949e" opacity="0.35">zsh</text>

  <text class="ln l0" x="36" y="78" font-family="'JetBrains Mono', monospace" font-size="13" fill="#a78bfa"><tspan fill="#7c3aed" font-weight="700">$</tspan> cat philosophy.txt</text>
  <text class="ln l2" x="36" y="130" font-family="'JetBrains Mono', monospace" font-size="13" fill="#c9c9d4">I write code that lives close to the metal.</text>
  <text class="ln l3" x="36" y="156" font-family="'JetBrains Mono', monospace" font-size="13" fill="#c9c9d4">Pipelines, shaders, physics — that's where I feel at home.</text>
  <text class="ln l5" x="36" y="208" font-family="'JetBrains Mono', monospace" font-size="13" fill="#c9c9d4">By day I ship production software.</text>
  <text class="ln l6" x="36" y="234" font-family="'JetBrains Mono', monospace" font-size="13" fill="#c9c9d4">By night I push polygons and simulate worlds.</text>
  <text class="ln l8" x="36" y="286" font-family="'JetBrains Mono', monospace" font-size="13"><tspan fill="#a78bfa">The goal:</tspan><tspan fill="#ffffff" font-weight="600">      build something people play.</tspan></text>
  <text class="ln l9" x="36" y="312" font-family="'JetBrains Mono', monospace" font-size="13"><tspan fill="#a78bfa">The long game:</tspan><tspan fill="#ffffff" font-weight="600"> build the studio that makes it.</tspan></text>
  <g class="ln l11"><text x="36" y="364" font-family="'JetBrains Mono', monospace" font-size="13" fill="#7c3aed" font-weight="700">$</text><rect class="cursor" x="54" y="352" width="8" height="15" fill="#c4b5fd" opacity="0.9"/></g>
</svg>
