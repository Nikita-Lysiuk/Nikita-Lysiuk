<svg width="900" height="36" viewBox="0 0 900 36" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="36" fill="#0a0a0f"/>
  <line x1="0" y1="18" x2="900" y2="18" stroke="#1a1a2e" stroke-width="1"/>
  <rect x="0" y="0" width="220" height="36" fill="#0a0a0f"/>
  <text x="16" y="23" font-family="'JetBrains Mono', monospace" font-size="11" fill="#7c3aed" letter-spacing="2" font-weight="600">// stack</text>
  <line x1="200" y1="18" x2="900" y2="18" stroke="#1a1a2e" stroke-width="1"/>
  <circle cx="200" cy="18" r="3" fill="#7c3aed">
    <animate attributeName="opacity" values="0.35;0.9;0.35" dur="2.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="18" r="3" fill="none" stroke="#7c3aed" stroke-width="1">
    <animate attributeName="r" values="3;11" dur="2.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0" dur="2.6s" repeatCount="indefinite"/>
  </circle>
  <circle cy="18" r="1.6" fill="#a78bfa">
    <animate attributeName="cx" values="200;900" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.08;0.85;1" dur="7s" repeatCount="indefinite"/>
  </circle>
</svg>
